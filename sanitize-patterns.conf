# Sanitize Patterns Config
# Only applies to PUBLIC repos (detected via gh API, cached 1hr)
# The hook skips private repos entirely — no performance cost

# ============================================================================
# PUBLIC REPOS (explicit list for fast detection — skips gh API call)
# Format: @public repo-name
# ============================================================================
# @public my-public-repo

# ============================================================================
# DOTFILE POLICY: allowlist (everything else is flagged)
# Any dotfile/dotfolder NOT in this list triggers a warning on public repos
# ============================================================================
@dotfile-safe .gitignore
@dotfile-safe .gitattributes
@dotfile-safe .gitkeep
@dotfile-safe .github/
@dotfile-safe .vscode/
@dotfile-safe .editorconfig
@dotfile-safe .prettierrc
@dotfile-safe .eslintrc
@dotfile-safe .stylelintrc
@dotfile-safe .dockerignore
@dotfile-safe .nvmrc
@dotfile-safe .node-version
@dotfile-safe .python-version
@dotfile-safe .tool-versions
@dotfile-safe .flake8
@dotfile-safe .pylintrc
@dotfile-safe .rubocop
@dotfile-safe .husky/
@dotfile-safe .changeset/
@dotfile-safe .storybook/

# ============================================================================
# SENSITIVE PATTERNS (one per line, grep-compatible regex)
# These are checked against git diff before pushing to any public repo
#
# RULE: Only include patterns with LOW false-positive rate.
# A pattern that fires on every commit is worse than no pattern.
# ============================================================================

# --- Private project names (add your private repo names here) ---
# my-private-project
# my-secret-saas

# --- Personal identifiers (add your username, home path, email) ---
# your-username
# /home/your-username
# /Users/your-username
# your-private@email.com

# --- API keys with reliable prefixes (low false-positive) ---
sk-[a-zA-Z0-9]{20,}
sk-ant-[a-zA-Z0-9-]{20,}
AKIA[A-Z0-9]{16}
ghp_[a-zA-Z0-9]{36}
gho_[a-zA-Z0-9]{36}
ghs_[a-zA-Z0-9]{36}
github_pat_[a-zA-Z0-9_]{22,}
xoxb-[0-9]{10,}
xoxp-[0-9]{10,}
sk_live_[a-zA-Z0-9]{20,}
sk_test_[a-zA-Z0-9]{20,}
rk_live_[a-zA-Z0-9]{20,}
whsec_[a-zA-Z0-9]{20,}
npm_[a-zA-Z0-9]{36}
dckr_pat_[a-zA-Z0-9_-]{20,}
AC[a-f0-9]{32}

# --- SSH & private keys ---
BEGIN.*PRIVATE KEY
BEGIN.*CERTIFICATE
id_rsa[^.]
id_ed25519[^.]

# --- Connection strings with credentials embedded ---
postgres://[^:]+:[^@]+@
mysql://[^:]+:[^@]+@
redis://[^:]+:[^@]+@
mongodb(\+srv)?://[^:]+:[^@]+@
amqp://[^:]+:[^@]+@

# --- Add your server IPs/domains below ---
# 203\.0\.113\.
# your-private-domain\.com
